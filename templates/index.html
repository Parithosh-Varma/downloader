<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; }
    </style>
</head>
<body class="text-neutral-200 font-sans min-h-screen flex flex-col justify-between selection:bg-neutral-800 selection:text-white">

    <header class="max-w-2xl w-full mx-auto px-6 pt-8 pb-4">
        <a href="#" class="text-xs tracking-widest uppercase font-semibold text-neutral-400 hover:text-white transition-colors">
            Downloader
        </a>
    </header>

    <main class="max-w-2xl w-full mx-auto px-6 py-12 flex-grow flex flex-col justify-center">

        <section class="mb-12">
            <h1 class="text-2xl font-normal text-white mb-2 tracking-tight">Save video or audio</h1>
            <p class="text-neutral-500 text-sm mb-8">Enter a link to extract and download media files.</p>

            <form id="download-form" class="space-y-3">
                <div class="relative flex items-center border-b border-neutral-800 focus-within:border-neutral-500 transition-colors py-2">
                    <input
                        type="url"
                        id="media-url"
                        required
                        placeholder="Paste link here..."
                        class="w-full bg-transparent pr-12 focus:outline-none text-sm text-white placeholder-neutral-600"
                    >
                    <button
                        type="submit"
                        class="absolute right-0 text-xs tracking-wider uppercase font-medium text-neutral-400 hover:text-white transition-colors py-1"
                    >
                        Analyze
                    </button>
                </div>
                <details class="text-left">
                    <summary class="text-[10px] text-neutral-700 cursor-pointer hover:text-neutral-500 select-none tracking-wider uppercase">Cookies (required for YouTube)</summary>
                    <textarea id="cookies-input" rows="3" class="mt-2 w-full px-3 py-2 bg-neutral-900 border border-neutral-800 rounded focus:outline-none focus:border-neutral-600 text-white placeholder-neutral-700 text-xs font-mono" placeholder="Paste Netscape cookies here (Get cookies.txt extension)"></textarea>
                </details>
            </form>
        </section>

        <section id="results-section" class="hidden border-t border-neutral-900 pt-8">

            <div id="loading-state" class="hidden py-4">
                <p class="text-xs text-neutral-500 tracking-wider uppercase animate-pulse">Analyzing source...</p>
            </div>

            <div id="error-state" class="hidden py-4 text-xs text-red-400">
                <span id="error-message"></span>
            </div>

            <div id="download-panel" class="hidden space-y-8">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <h2 id="media-title" class="text-sm font-medium text-white truncate max-w-md">Media Title</h2>
                        <p id="media-author" class="text-xs text-neutral-500 mt-0.5">Source Creator</p>
                    </div>
                    <span id="media-duration" class="text-xs font-mono text-neutral-600 shrink-0">00:00</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                    <div>
                        <h3 class="text-xs text-neutral-500 uppercase tracking-widest font-semibold mb-3">Video</h3>
                        <div id="video-formats" class="space-y-1">
                            <div class="text-xs text-neutral-600 py-4 text-center">No formats loaded</div>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xs text-neutral-500 uppercase tracking-widest font-semibold mb-3">Audio</h3>
                        <div id="audio-formats" class="space-y-1">
                            <div class="text-xs text-neutral-600 py-4 text-center">No formats loaded</div>
                        </div>
                    </div>
                </div>

                <div id="progress-container" class="hidden pt-4">
                    <div class="flex justify-between items-center text-xs text-neutral-500 mb-1.5">
                        <span id="progress-status">Downloading...</span>
                        <span id="progress-percent" class="font-mono">0%</span>
                    </div>
                    <div class="w-full bg-neutral-900 h-[1px]">
                        <div id="progress-bar" class="bg-neutral-400 h-[1px] w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="max-w-2xl w-full mx-auto px-6 py-8 border-t border-neutral-900 flex justify-between text-[10px] text-neutral-600 tracking-wider uppercase">
        <span>&copy; 2026 Downloader</span>
        <div class="space-x-4">
            <a href="#" class="hover:text-neutral-400 transition-colors">Terms</a>
            <a href="#" class="hover:text-neutral-400 transition-colors">Privacy</a>
        </div>
    </footer>

    <script>
        const downloadForm = document.getElementById('download-form');
        const mediaUrlInput = document.getElementById('media-url');
        const resultsSection = document.getElementById('results-section');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const errorMessage = document.getElementById('error-message');
        const downloadPanel = document.getElementById('download-panel');
        const mediaTitle = document.getElementById('media-title');
        const mediaAuthor = document.getElementById('media-author');
        const mediaDuration = document.getElementById('media-duration');
        const videoFormats = document.getElementById('video-formats');
        const audioFormats = document.getElementById('audio-formats');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressStatus = document.getElementById('progress-status');
        const progressPercent = document.getElementById('progress-percent');

        let currentUrl = '';

        function getCookies() {
            return document.getElementById('cookies-input').value.trim();
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        downloadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = mediaUrlInput.value.trim();
            if (!url) return;

            currentUrl = url;
            resultsSection.classList.remove('hidden');
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            downloadPanel.classList.add('hidden');
            progressContainer.classList.add('hidden');

            try {
                const resp = await fetch('/api/fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, cookies: getCookies() }),
                });
                const data = await resp.json();
                loadingState.classList.add('hidden');

                if (!resp.ok) {
                    errorMessage.textContent = data.error || 'Failed to fetch media info';
                    errorState.classList.remove('hidden');
                    return;
                }

                mediaTitle.textContent = data.title || 'Unknown';
                mediaAuthor.textContent = data.author || '';
                mediaDuration.textContent = data.duration || '00:00';

                renderFormats('video', data.video_formats || []);
                renderFormats('audio', data.audio_formats || []);
                downloadPanel.classList.remove('hidden');
            } catch (err) {
                loadingState.classList.add('hidden');
                errorMessage.textContent = err.message || 'Network error';
                errorState.classList.remove('hidden');
            }
        });

        function renderFormats(type, formats) {
            const container = type === 'video' ? videoFormats : audioFormats;
            container.innerHTML = '';

            if (!formats.length) {
                container.innerHTML = '<div class="text-xs text-neutral-600 py-4 text-center">No formats available</div>';
                return;
            }

            formats.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'w-full flex justify-between items-center py-2 text-xs hover:text-white text-neutral-400 border-b border-neutral-900 transition-colors';
                btn.innerHTML = `
                    <span>${escapeHtml(f.label)} ${f.filesize ? `<span class="text-neutral-600 font-mono">${escapeHtml(f.filesize)}</span>` : ''}</span>
                    <span class="text-neutral-600">Download</span>
                `;
                btn.addEventListener('click', () => startDownload(f.format_id, type));
                container.appendChild(btn);
            });
        }

        async function startDownload(formatId, mode) {
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            progressStatus.textContent = 'Preparing...';

            try {
                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: currentUrl, format_id: formatId, mode, cookies: getCookies() }),
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    progressStatus.textContent = err.error || 'Download failed';
                    return;
                }

                progressStatus.textContent = 'Saving...';
                const blob = await resp.blob();
                const disposition = resp.headers.get('Content-Disposition') || '';
                const match = disposition.match(/filename="?(.+?)"?$/);
                const filename = match ? match[1] : 'download.' + (mode === 'audio' ? 'mp3' : 'mp4');

                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                progressStatus.textContent = 'Saved';

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                setTimeout(() => progressContainer.classList.add('hidden'), 2000);
            } catch (err) {
                progressStatus.textContent = 'Download failed: ' + err.message;
            }
        }
    </script>
</body>
</html>
